<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Course Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
html,body{overflow-x:hidden}
html,body,#root{height:100%}
:root{
  --bg:#050505;
  --bg2:#0b0b0b;
  --surface:#111111;
  --surface2:#181818;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.03);
  --text:#f5f5f5;
  --text2:rgba(255,255,255,0.62);
  --text3:rgba(255,255,255,0.32);
  --gold:#d4a84f;
  --gold2:#a07830;
  --gold-glow:rgba(212,168,79,0.14);
  --gold-glow2:rgba(212,168,79,0.06);
  --radius:10px;
  --shadow:0 8px 32px rgba(0,0,0,0.55);
  --ease:cubic-bezier(.22,1,.36,1);
  --t-fast:180ms;
  --t-mid:260ms;
  --t-drawer:320ms;
}
body{font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(circle at 50% 0%,rgba(212,168,79,0.05),transparent 45%),#050505;
  color:var(--text);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}
input,button{outline:none;font:inherit;border:none;background:none}
a{text-decoration:none;color:inherit}

/* noise texture overlay */
body::before{content:'';position:fixed;inset:0;opacity:0.025;pointer-events:none;z-index:0;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

.fade-up{animation:fade-up 0.5s ease both}

/* Skeleton shimmer */
@keyframes skel{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);background-size:800px 100%;animation:skel 1.4s ease infinite}

/* Premium card system */
.cat-block{
  background:linear-gradient(180deg,rgba(255,255,255,0.025),rgba(255,255,255,0)) var(--surface);
  transition:border-color var(--t-mid) var(--ease),background-color var(--t-mid) var(--ease),box-shadow var(--t-mid) var(--ease);
}
.cat-block:hover{
  background-color:var(--surface2);
  box-shadow:0 8px 28px rgba(0,0,0,0.45);
}
.cat-btn{transition:all var(--t-mid) var(--ease)!important}
.cat-btn:active{transform:scale(0.985)!important}

/* Subject color hover glow */
.cat-block:hover .cat-btn{
  filter:brightness(1.06);
}

/* Stat cards */
.mobile-stat-card{
  background:linear-gradient(180deg,rgba(212,168,79,0.04),transparent);
  border:1px solid rgba(255,255,255,0.05)!important;
}

/* Search premium */
.search-in{
  background:rgba(255,255,255,0.03)!important;
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.06)!important;
  transition:border-color var(--t-fast) ease,box-shadow var(--t-fast) ease;
}
.search-in:focus{
  border-color:rgba(212,168,79,0.4)!important;
  box-shadow:0 0 0 1px rgba(212,168,79,0.15),0 12px 30px rgba(212,168,79,0.08)!important;
}

/* Drawer premium */
.drawer{
  background:rgba(8,8,8,0.96)!important;
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.05)!important;
  transition:transform var(--t-drawer) var(--ease)!important;
}

/* Section label */
.section-label{
  font-size:0.55rem;color:var(--text3);font-family:monospace;
  text-transform:uppercase;letter-spacing:0.18em;
  padding:14px 18px 8px;
}

/* Scroll fade at bottom */
.scroll-fade{
  position:sticky;bottom:0;left:0;right:0;
  height:80px;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(5,5,5,0.9));
  margin-top:-80px;
}

/* Footer — NO parent opacity */
.vault-footer{
  border-top:1px solid rgba(255,255,255,0.05);
  padding:40px 24px 32px;
  text-align:center;
}
.status-dot{
  width:8px;height:8px;border-radius:999px;
  background:#27c093;
  box-shadow:0 0 12px rgba(39,192,147,0.6);
  display:inline-block;margin-right:6px;
  animation:pulse-dot 3s ease infinite;
  flex-shrink:0;
}

/* ── Mobile ─────────────────────────────────── */
@media(max-width:640px){
  body{font-size:14px;overflow-x:hidden}
  .sidebar-nav{display:none!important}
  .ctrl-row{display:none!important}
  .updated-label{display:none!important}
  .desktop-stats{display:none!important}

  /* Header stacks vertically */
  .header-brand{
    flex-direction:column!important;align-items:flex-start!important;
    padding:12px 16px 0!important;height:auto!important;gap:0!important
  }
  .brand-left{width:100%}
  .mobile-hamburger{display:flex!important}

  /* Search row */
  .header-search-row{
    padding:10px 16px 12px!important;gap:8px!important
  }
  .search-in{
    font-size:16px!important;height:52px!important;
    border-radius:14px!important;padding:0 16px 0 42px!important
  }
  .search-icon{top:50%!important;left:14px!important}

  /* 2x2 stat grid */
  .mobile-stats{
    display:grid!important;
    grid-template-columns:1fr 1fr;
    gap:8px;padding:10px 16px 12px;
    border-top:1px solid var(--border2)
  }
  .mobile-stat-card{
    background:var(--surface);border:1px solid var(--border2);
    border-radius:10px;padding:10px 12px;
    display:flex;flex-direction:column;gap:2px
  }
  .mobile-stat-val{
    font-family:'Playfair Display',Georgia,serif;
    font-size:1.3rem;font-weight:600;color:var(--gold);
    line-height:1;letter-spacing:-0.02em
  }
  .mobile-stat-lbl{
    font-size:0.6rem;color:var(--text3);
    text-transform:uppercase;letter-spacing:0.08em;font-family:monospace
  }

  /* Category cards on mobile */
  .cat-btn{
    padding:14px 16px!important;
    min-height:44px
  }
  .cat-name{font-size:1rem!important;white-space:normal!important}
  .cat-meta{flex-direction:column!important;gap:2px!important}
  .cat-meta span{display:block}

  /* Touch targets */
  .cat-go{width:44px!important;height:44px!important;font-size:1rem!important}
  .go-link{width:32px!important;height:32px!important}

  /* Tree rows bigger */
  .tree-row{padding-top:8px!important;padding-bottom:8px!important}

  /* Safe area */
  main{padding-bottom:env(safe-area-inset-bottom)}

  /* Drawer overlay */
  .drawer-overlay{display:block!important}
  .drawer{transform:translateX(0)!important}
}
@media(min-width:641px){
  .mobile-stats{display:none!important}
  .mobile-hamburger{display:none!important}
  .drawer-overlay{display:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

function hexRgb(h){ return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
function fmtNum(n){ return n?.toLocaleString('en-IN')??'—' }
function fmtIST(iso){ if(!iso)return null; return new Date(iso).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true})+' IST'; }
function fmtRel(iso){ if(!iso)return null; const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000); if(m<1)return'just now'; if(m<60)return`${m}m ago`; const h=Math.floor(m/60); if(h<24)return`${h}h ago`; return`${Math.floor(h/24)}d ago`; }

function nodeHasMatch(n,q){ if(!q)return true; if(n.name.toLowerCase().includes(q))return true; return n.children?.some(c=>nodeHasMatch(c,q))??false; }
function catHasMatch(c,q){ if(!q)return true; if(c.name.toLowerCase().includes(q))return true; return c.children?.some(n=>nodeHasMatch(n,q))??false; }

function Hl({text,q}){
  if(!q)return <>{text}</>;
  const i=text.toLowerCase().indexOf(q);
  if(i===-1)return <>{text}</>;
  return <>{text.slice(0,i)}<span style={{color:'var(--gold)',fontWeight:500}}>{text.slice(i,i+q.length)}</span>{text.slice(i+q.length)}</>;
}

function TreeNode({node,depth,q,forceOpen}){
  const has=!!(node.children?.length);
  const cm=has&&node.children.some(c=>nodeHasMatch(c,q));
  const sm=!!q&&node.name.toLowerCase().includes(q);
  const vis=!q||sm||cm;
  const [open,setOpen]=useState(false);
  const isOpen=forceOpen||open||(!!q&&cm);
  if(!vis)return null;
  const pad=depth*18+14;
  const url=node.id?`https://drive.google.com/drive/folders/${node.id}`:null;
  return(
    <div>
      <div className="tree-row" onClick={()=>has&&setOpen(p=>!p)}
        style={{display:'flex',alignItems:'center',gap:6,padding:`5px 14px 5px ${pad}px`,cursor:has?'pointer':'default',userSelect:'none'}}>
        <span style={{flex:1,fontSize:depth===0?'0.76rem':'0.71rem',fontWeight:depth===0?500:400,
          color:depth===0?'var(--text)':depth===1?'var(--text2)':'rgba(170,162,154,0.9)',lineHeight:1.4,
          display:'flex',alignItems:'center',gap:5}}>
          {has&&<span style={{fontSize:'0.65rem',color:'rgba(255,255,255,0.35)',
            transition:'transform 0.15s',transform:isOpen?'rotate(90deg)':'none',
            display:'inline-block',flexShrink:0,lineHeight:1}}>›</span>}
          <Hl text={node.name} q={q}/>
        </span>
        {has&&<span style={{fontSize:'0.58rem',color:'var(--text3)',fontFamily:'monospace',flexShrink:0}}>{node.children.length}</span>}
        {url&&<a href={url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} className="go-link" title="Open in Drive">↗</a>}
      </div>
      {has&&isOpen&&(
        <div style={{borderLeft:'1px solid var(--border2)',marginLeft:pad+12}}>
          {node.children.map((c,i)=><TreeNode key={i} node={c} depth={depth+1} q={q} forceOpen={forceOpen}/>)}
        </div>
      )}
    </div>
  );
}

function CatBlock({cat,q,active,forceOpen}){
  const [open,setOpen]=useState(false);
  const [hovered,setHovered]=useState(false);
  const vis=catHasMatch(cat,q);
  const show=open||forceOpen||(!!q&&catHasMatch(cat,q));
  if(!vis)return null;
  const rgb=hexRgb(cat.hue);
  const url=cat.driveId?`https://drive.google.com/drive/folders/${cat.driveId}`:null;
  // Dynamic accent glow on hover (Phase 13 + 14)
  const hoverStyle=hovered?{
    transform:'translateY(-2px)',
    boxShadow:`0 12px 30px rgba(0,0,0,0.45), 0 0 0 1px rgba(${rgb},0.08), 0 0 30px rgba(${rgb},0.07)`,
  }:{};
  return(
    <div id={`cat-${cat.id}`} className="cat-block"
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{borderBottom:'1px solid var(--border2)',scrollMarginTop:110,transition:'transform var(--t-mid) var(--ease),box-shadow var(--t-mid) var(--ease)',...hoverStyle}}>
      <button onClick={()=>setOpen(p=>!p)} className="cat-btn"
        style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'13px 18px',cursor:'pointer',textAlign:'left',
          background:show?`linear-gradient(100deg,rgba(${rgb},0.08) 0%,rgba(${rgb},0.02) 40%,transparent 70%)`:'transparent',
          borderLeft:show?`2px solid rgba(${rgb},0.7)`:'2px solid transparent',
          transition:'all 0.2s ease'}}>
        <div style={{flexShrink:0,width:30,height:30,borderRadius:7,
          background:`linear-gradient(135deg,rgba(${rgb},0.15),rgba(${rgb},0.05))`,
          border:`1px solid rgba(${rgb},0.2)`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'0.58rem',fontWeight:700,color:`rgba(${rgb},0.9)`,fontFamily:'monospace',letterSpacing:'0.03em'}}>
          {cat.id}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:'0.9rem',fontWeight:600,letterSpacing:'-0.02em',fontFamily:"'Clash Display','Outfit',system-ui",
            color:show?'var(--text)':`rgba(${rgb},0.75)`,
            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',transition:'color var(--t-fast) ease'}}>
            <Hl text={cat.name} q={q}/>
          </div>
          <div className="cat-meta" style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:'0.62rem',color:'var(--text3)',fontFamily:'monospace',fontVariantNumeric:'tabular-nums'}}>{fmtNum(cat.count)} folders</span>
            <span style={{fontSize:'0.5rem',color:'var(--border)',opacity:0.6}}>&bull;</span>
            <span style={{fontSize:'0.62rem',color:hovered?`rgba(${rgb},0.7)`:'var(--text3)',fontFamily:'monospace',fontVariantNumeric:'tabular-nums',transition:'color var(--t-fast) ease'}}>{cat.size}</span>
          </div>
        </div>
        {url&&<a href={url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}
          className="cat-go" title="Open in Google Drive" style={{color:`rgba(${rgb},0.5)`,minWidth:44,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>↗</a>}
        <span style={{flexShrink:0,fontSize:'0.8rem',color:show?`rgba(${rgb},0.7)`:'var(--text3)',
          transition:'transform 0.2s,color 0.2s',transform:show?'rotate(180deg)':'none',display:'inline-block',
          width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>⌄</span>
      </button>
      {show&&(
        <div style={{paddingTop:2,paddingBottom:8,background:'rgba(0,0,0,0.18)'}}>
          {cat.children?.map((n,i)=><TreeNode key={i} node={n} depth={0} q={q} forceOpen={forceOpen}/>)}
        </div>
      )}
    </div>
  );
}

function Loader(){
  const rows=[1,2,3,4,5,6,7];
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {/* Header skeleton */}
      <div style={{height:62,borderBottom:'1px solid var(--border)',padding:'0 28px',display:'flex',alignItems:'center',gap:16}}>
        <div className="skel" style={{width:32,height:32,borderRadius:8}}/>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div className="skel" style={{width:120,height:12,borderRadius:4}}/>
          <div className="skel" style={{width:80,height:8,borderRadius:4}}/>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:16}}>
          {[60,50,70,44].map((w,i)=>(<div key={i} className="skel" style={{width:w,height:28,borderRadius:6}}/>))}
        </div>
      </div>
      {/* Search skeleton */}
      <div style={{padding:'10px 28px 12px',borderBottom:'1px solid var(--border2)'}}>
        <div className="skel" style={{height:36,borderRadius:7,maxWidth:460}}/>
      </div>
      {/* Body skeleton */}
      <div style={{display:'flex',flex:1,minHeight:0}}>
        <div style={{width:220,borderRight:'1px solid var(--border)',padding:'14px 8px',flexShrink:0}}>
          {[80,65,72,60,68,55,70].map((w,i)=>(<div key={i} className="skel" style={{width:`${w}%`,height:28,borderRadius:6,marginBottom:2}}/>))}
        </div>
        <div style={{flex:1,padding:'0 0 0 0'}}>
          {rows.map(i=>(
            <div key={i} style={{padding:'13px 18px',borderBottom:'1px solid var(--border2)',display:'flex',alignItems:'center',gap:12}}>
              <div className="skel" style={{width:30,height:30,borderRadius:7,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div className="skel" style={{width:`${40+i*7}%`,height:13,borderRadius:4,marginBottom:6}}/>
                <div className="skel" style={{width:'30%',height:9,borderRadius:4}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [q,setQ]=useState('');
  const [activeId,setActiveId]=useState('01');
  const [forceOpen,setForceOpen]=useState(false);
  const [syncInfo,setSyncInfo]=useState(null);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const inputRef=useRef(null);
  const nq=q.trim().toLowerCase();

  const load=useCallback(()=>{
    setLoading(true);setError(null);
    fetch('/api/tree').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
      .then(d=>{setData(d);setLoading(false)}).catch(e=>{setError(e.message);setLoading(false)});
  },[]);

  useEffect(()=>{load();fetch('/api/status').then(r=>r.json()).then(setSyncInfo).catch(()=>{});},[]);
  useEffect(()=>{const t=setInterval(()=>fetch('/api/status').then(r=>r.json()).then(setSyncInfo).catch(()=>{}),60000);return()=>clearInterval(t);},[]);
  // ⌘K / Ctrl+K focuses search
  useEffect(()=>{
    const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();inputRef.current?.focus();}}
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[]);

  const visible=useMemo(()=>(data?.categories||[]).filter(c=>catHasMatch(c,nq)),[data,nq]);
  const stats=data?.stats;
  const cats=data?.categories||[];

  function scrollTo(id){setActiveId(id);document.getElementById(`cat-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'});}

  if(loading)return <Loader/>;
  if(error)return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
      <p style={{color:'#8a4a4a',fontSize:'0.8rem'}}>{error}</p>
      <button onClick={load} style={{padding:'7px 20px',borderRadius:6,border:'1px solid var(--border)',color:'var(--text2)',cursor:'pointer',background:'var(--surface)'}}>Retry</button>
    </div>
  );

  return(
    <div className="fade-up" style={{fontFamily:"'Inter',system-ui,sans-serif",background:'var(--bg)',color:'var(--text)',height:'100vh',display:'flex',flexDirection:'column',fontSize:13,position:'relative',zIndex:1,maxWidth:1600,margin:'0 auto'}}>
      <style>{`
        .tree-row{transition:background 0.1s}.tree-row:hover{background:rgba(255,255,255,0.03)}
        .cat-btn:hover{filter:brightness(1.05)}
        .go-link{flex-shrink:0;opacity:0;transition:opacity 0.15s;width:18px;height:16px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);font-size:0.6rem}
        .tree-row:hover .go-link{opacity:1}.go-link:hover{color:var(--gold)!important;border-color:rgba(212,168,83,0.3)!important}
        .cat-go{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid rgba(255,255,255,0.06);font-size:0.7rem;transition:all 0.15s}
        .cat-go:hover{color:var(--gold)!important;border-color:rgba(212,168,83,0.3)!important;background:rgba(212,168,83,0.08)}
        .sb-btn{transition:all 0.12s;border:none;cursor:pointer;text-align:left}.sb-btn:hover{background:rgba(255,255,255,0.04)!important}
        .ctrl{padding:5px 13px;border-radius:5px;border:1px solid var(--border);color:var(--text3);font-size:0.67rem;font-weight:450;cursor:pointer;letter-spacing:0.01em;background:transparent;transition:all 0.15s}
        .ctrl:hover{color:var(--text2);border-color:rgba(255,255,255,0.12);background:var(--surface)}
        .ctrl.on{color:var(--gold);border-color:rgba(212,168,83,0.3);background:var(--gold-glow2)}
        .search-in::placeholder{color:var(--text3)}.search-in:focus{border-color:rgba(212,168,83,0.3)!important;box-shadow:0 0 0 3px rgba(212,168,83,0.06)}
        .sidebar::-webkit-scrollbar{width:0}
        .stat-val{font-family:'Clash Display','Outfit',Georgia,serif;font-size:1.15rem;font-weight:600;color:var(--gold);letter-spacing:-0.03em;line-height:1;font-variant-numeric:tabular-nums}
        .stat-lbl{font-size:0.48rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;margin-top:4px;font-family:monospace}
      `}</style>

      {/* ══ DRAWER (mobile) ══ */}
      <div className="drawer-overlay" onClick={()=>setDrawerOpen(false)}
        style={{display:'none',position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:200,backdropFilter:'blur(4px)',
          opacity:drawerOpen?1:0,pointerEvents:drawerOpen?'all':'none',transition:'opacity 0.25s'}}>
        <nav className="drawer" onClick={e=>e.stopPropagation()}
          style={{position:'absolute',left:0,top:0,bottom:0,width:260,
            background:'var(--bg2)',borderRight:'1px solid var(--border)',
            transform:drawerOpen?'translateX(0)':'translateX(-100%)',
            transition:'transform 0.28s cubic-bezier(0.4,0,0.2,1)',
            overflowY:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'18px 16px',borderBottom:'1px solid var(--border2)'}}>
            <span style={{fontSize:'0.75rem',color:'var(--text3)',fontFamily:'monospace',
              textTransform:'uppercase',letterSpacing:'0.12em'}}>Subjects</span>
            <button onClick={()=>setDrawerOpen(false)}
              style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',
                borderRadius:6,border:'1px solid var(--border)',color:'var(--text2)',cursor:'pointer',
                background:'transparent',fontSize:'1rem'}}>✕</button>
          </div>
          <div style={{padding:'8px'}}>
            {cats.map(cat=>{
              const act=cat.id===activeId;
              const rgb=hexRgb(cat.hue);
              return(
                <button key={cat.id} className="sb-btn" onClick={()=>{scrollTo(cat.id);setDrawerOpen(false);}}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
                    borderRadius:8,marginBottom:2,minHeight:44,
                    background:act?`linear-gradient(90deg,rgba(${rgb},0.12),rgba(${rgb},0.04))`:'transparent'}}>
                  <span style={{width:6,height:6,borderRadius:'50%',flexShrink:0,
                    background:act?`rgba(${rgb},0.9)`:'var(--text3)'}}/>
                  <span style={{fontSize:'0.88rem',flex:1,color:act?'var(--text)':'var(--text2)',fontWeight:act?500:400}}>
                    {cat.shortName}
                  </span>
                  <span style={{fontSize:'0.6rem',color:`rgba(${rgb},0.6)`,fontFamily:'monospace'}}>{cat.id}</span>
                </button>
              );
            })}
          </div>
        </nav>
      </div>

      {/* ══ HEADER ══ */}
      <header style={{flexShrink:0,background:'rgba(5,5,5,0.97)',backdropFilter:'blur(24px)',
        borderBottom:'1px solid rgba(255,255,255,0.05)',position:'sticky',top:0,zIndex:100,overflow:'hidden'}}>

        <div style={{position:'absolute',top:0,left:0,right:0,height:'1px',
          background:'linear-gradient(90deg,transparent 0%,rgba(212,168,79,0.5) 30%,rgba(212,168,79,0.5) 70%,transparent 100%)'}}/>

        {/* Brand + stats row */}
        <div className="header-brand" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',height:62}}>
          <div className="brand-left" style={{display:'flex',alignItems:'center',gap:14}}>
            {/* Hamburger — mobile only */}
            <button className="mobile-hamburger" onClick={()=>setDrawerOpen(true)}
              style={{display:'none',width:40,height:40,alignItems:'center',justifyContent:'center',
                borderRadius:8,border:'1px solid var(--border)',background:'transparent',
                color:'var(--text2)',cursor:'pointer',flexShrink:0,fontSize:'1.1rem'}}>☰</button>
            {/* Logo */}
            <div style={{width:32,height:32,borderRadius:8,
              background:'linear-gradient(145deg,rgba(212,168,83,0.12),rgba(212,168,83,0.03))',
              border:'1px solid rgba(212,168,83,0.2)',
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="1" y="1" width="5" height="5" rx="1.5" fill="#d4a853" opacity="0.9"/>
                <rect x="8" y="1" width="5" height="5" rx="1.5" fill="#d4a853" opacity="0.35"/>
                <rect x="1" y="8" width="5" height="5" rx="1.5" fill="#d4a853" opacity="0.35"/>
                <rect x="8" y="8" width="5" height="5" rx="1.5" fill="#d4a853" opacity="0.12"/>
              </svg>
            </div>
            <div>
              <div style={{fontSize:'0.95rem',fontWeight:600,color:'#ede8e0',letterSpacing:'-0.025em',fontFamily:"'Playfair Display',Georgia,serif"}}>Course Library</div>
              <div style={{fontSize:'0.53rem',color:'var(--text3)',fontFamily:'monospace',marginTop:1,letterSpacing:'0.08em',textTransform:'uppercase'}}>Private Knowledge Vault</div>
            </div>
          </div>
          {/* Desktop stats */}
          <div className="desktop-stats header-stats" style={{display:'flex',alignItems:'stretch',gap:0}}>
            {[
              {v:stats?.fileCount?fmtNum(stats.fileCount):'—',l:'Files'},
              {v:fmtNum(stats?.totalFolders),l:'Folders'},
              {v:stats?.totalSize||'—',l:'Total Size'},
              {v:fmtNum(stats?.totalCategories),l:'Subjects'},
            ].map((s,i)=>(
              <div key={i} className="stat-box" style={{padding:'0 20px',textAlign:'center',borderLeft:'1px solid var(--border)',flexShrink:0}}>
                <div className="stat-val">{s.v}</div>
                <div className="stat-lbl">{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Mobile 2x2 stat grid */}
        <div className="mobile-stats">
          {[
            {v:stats?.totalSize||'—',l:'Storage'},
            {v:stats?.fileCount?fmtNum(stats.fileCount):'—',l:'Files'},
            {v:fmtNum(stats?.totalFolders),l:'Folders'},
            {v:fmtNum(stats?.totalCategories),l:'Subjects'},
          ].map((s,i)=>(
            <div key={i} className="mobile-stat-card">
              <div className="mobile-stat-val">{s.v}</div>
              <div className="mobile-stat-lbl">{s.l}</div>
            </div>
          ))}
        </div>

        {/* Search + controls row */}
        <div className="header-search-row" style={{display:'flex',alignItems:'center',gap:10,padding:'9px 28px 12px',borderTop:'1px solid var(--border2)'}}>
          <div style={{position:'relative',flex:1,maxWidth:460}}>
            <svg className="search-icon" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',opacity:0.3,pointerEvents:'none'}}
              width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" strokeWidth="1.3"/>
              <line x1="9" y1="9" x2="12" y2="12" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
            </svg>
            <input ref={inputRef} className="search-in" value={q} onChange={e=>setQ(e.target.value)}
              placeholder="Search vault…"
              style={{width:'100%',padding:'8px 32px 8px 30px',background:'var(--surface)',
                border:'1px solid var(--border)',borderRadius:7,color:'var(--text)',
                fontSize:'0.75rem',transition:'all 0.2s'}}/>
            {q&&<button onClick={()=>setQ('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',cursor:'pointer',fontSize:'1rem',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>}
          </div>

          {q&&<span style={{fontSize:'0.62rem',color:'var(--text2)',fontFamily:'monospace',whiteSpace:'nowrap'}}>{visible.length}/{cats.length}</span>}

          <div style={{flex:1}}/>
          {/* ⌘K hint — desktop only */}
          <div className="updated-label" style={{display:'flex',alignItems:'center',gap:6,fontSize:'0.58rem',color:'var(--text3)',fontFamily:'monospace'}}>
            <kbd style={{padding:'1px 5px',borderRadius:4,border:'1px solid rgba(255,255,255,0.1)',fontSize:'0.58rem',background:'rgba(255,255,255,0.04)'}}>⌘ K</kbd>
          </div>
          {/* Live sync status pill */}
          {(()=>{
            const st=syncInfo?.lastSyncStatus||'';
            const syncing=st.startsWith('syncing')||st.startsWith('running');
            const err=st.startsWith('err')||st.startsWith('fail');
            const dotColor=syncing?'#e8a838':err?'#e85555':'#27c093';
            const dotGlow=syncing?'rgba(232,168,56,0.55)':err?'rgba(232,85,85,0.55)':'rgba(39,192,147,0.6)';
            const label=syncing?'Syncing…':err?'Sync error':'Indexed & Synced';
            const ts=syncInfo?.lastSyncTime||stats?.lastUpdated;
            return(
              <div className="updated-label" style={{display:'flex',alignItems:'center',gap:6,
                padding:'3px 10px 3px 8px',borderRadius:999,
                border:'1px solid rgba(255,255,255,0.06)',
                background:'rgba(255,255,255,0.03)',
                backdropFilter:'blur(8px)',
                cursor:'default',userSelect:'none',flexShrink:0}}
                title={ts?`Last sync: ${fmtIST(ts)}`:label}>
                <span style={{width:6,height:6,borderRadius:'50%',flexShrink:0,
                  background:dotColor,
                  boxShadow:`0 0 8px ${dotGlow}`,
                  animation:syncing?'pulse-dot 1s ease infinite':'pulse-dot 3s ease infinite'}}/>
                <span style={{fontSize:'0.58rem',color:'rgba(255,255,255,0.6)',fontFamily:'monospace',whiteSpace:'nowrap'}}>{label}</span>
                {ts&&<>
                  <span style={{color:'rgba(255,255,255,0.2)',fontSize:'0.5rem'}}>·</span>
                  <span style={{fontSize:'0.56rem',color:'rgba(255,255,255,0.38)',fontFamily:'monospace',whiteSpace:'nowrap'}}>{fmtIST(ts)}</span>
                </>}
              </div>
            );
          })()}

          <div className="ctrl-row" style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:1,height:14,background:'var(--border)',flexShrink:0,marginRight:4}}/>
            <button className={`ctrl${forceOpen?' on':''}`} onClick={()=>setForceOpen(true)}>Expand</button>
            <button className="ctrl" onClick={()=>{setForceOpen(false);setQ('');}}>Collapse</button>
          </div>
        </div>
      </header>

      {/* ══ BODY ══ */}
      <div style={{display:'flex',flex:1,minHeight:0,overflow:'hidden'}}>

        {/* Sidebar */}
        <nav className="sidebar sidebar-nav" style={{width:220,flexShrink:0,borderRight:'1px solid var(--border)',
          background:'linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%)',overflowY:'auto'}}>
          <div style={{padding:'14px 8px'}}>
            <div style={{fontSize:'0.5rem',color:'var(--text3)',fontFamily:'monospace',textTransform:'uppercase',
              letterSpacing:'0.14em',padding:'2px 10px 10px',opacity:0.7}}>Subject Index</div>
            {cats.map(cat=>{
              const act=cat.id===activeId;
              const rgb=hexRgb(cat.hue);
              const matches=catHasMatch(cat,nq);
              return(
                <button key={cat.id} className="sb-btn" onClick={()=>scrollTo(cat.id)}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'6px 10px',
                    borderRadius:6,marginBottom:1,
                    background:act?`linear-gradient(90deg,rgba(${rgb},0.12),rgba(${rgb},0.04))`:'transparent',
                    opacity:nq&&!matches?0.2:1}}>
                  <span style={{width:4,height:4,borderRadius:'50%',flexShrink:0,
                    background:act?`rgba(${rgb},0.9)`:'var(--text3)',transition:'background 0.15s'}}/>
                  <span style={{fontSize:'0.72rem',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                    letterSpacing:'-0.01em',color:act?'var(--text)':'var(--text2)',fontWeight:act?500:400,transition:'color 0.15s'}}>
                    {cat.shortName}
                  </span>
                  <span style={{fontSize:'0.5rem',color:act?`rgba(${rgb},0.7)`:'var(--text2)',fontFamily:'monospace'}}>{cat.id}</span>
                </button>
              );
            })}
          </div>
        </nav>

        {/* Main */}
        <main style={{flex:1,overflowY:'auto',minWidth:0,position:'relative'}}>
          {visible.length===0?(
            <div style={{padding:'100px 40px',textAlign:'center'}}>
              <div style={{fontSize:'0.7rem',color:'var(--text3)',fontFamily:'monospace',letterSpacing:'0.04em'}}>
                No results for <span style={{color:'var(--gold)'}}>"{q}"</span>
              </div>
            </div>
          ):(
            <div>
              <div className="section-label">Subject Index</div>
              {visible.map(cat=>(
                <CatBlock key={cat.id} cat={cat} q={nq} active={cat.id===activeId} forceOpen={forceOpen}/>
              ))}
              {/* Scroll fade */}
              <div className="scroll-fade"/>
              {/* Footer */}
              <footer className="vault-footer" style={{padding:'40px 40px 80px',textAlign:'center'}}>
                <div style={{fontSize:'0.52rem',color:'rgba(255,255,255,0.22)',fontFamily:'monospace',letterSpacing:'0.22em',marginBottom:24,textTransform:'uppercase'}}>── End of Archive ──</div>
                <div style={{fontSize:'1.05rem',fontWeight:600,color:'rgba(255,255,255,0.88)',fontFamily:"'Playfair Display',serif",letterSpacing:'-0.02em',marginBottom:4}}>Course Library</div>
                <div style={{fontSize:'0.55rem',color:'rgba(255,255,255,0.32)',fontFamily:'monospace',letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:20}}>Private Knowledge Vault</div>
                <div style={{fontSize:'0.7rem',color:'rgba(255,255,255,0.62)',marginBottom:16,fontVariantNumeric:'tabular-nums'}}>
                  {stats?.fileCount?fmtNum(stats.fileCount):'—'} Files &bull; {fmtNum(stats?.totalFolders)} Folders &bull; {stats?.totalSize||'—'}
                </div>
                <div style={{fontSize:'0.72rem',color:'rgba(255,255,255,0.42)',fontStyle:'italic',marginBottom:18}}>&ldquo;Curated knowledge compounds forever.&rdquo;</div>
                <div style={{fontSize:'0.55rem',fontFamily:'monospace',letterSpacing:'0.1em',color:'rgba(255,255,255,0.32)'}}>Crafted &amp; Curated by <span style={{color:'rgba(212,168,79,0.82)'}}>Aman Agrahari</span></div>
              </footer>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
