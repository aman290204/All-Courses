<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cortexa Vault — Curated for Curious Minds</title>
<link rel="icon" type="image/png" href="/Logo.png">
<link rel="apple-touch-icon" href="/Logo.png">
<link rel="preload" as="image" href="/Logo.png" fetchpriority="high">
<link rel="preload" as="image" href="/Logo-with-Name.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
html,body{overflow-x:hidden}
html,body,#root{height:100%}
:root{
  /* Surfaces */
  --bg:#060607;
  --bg2:#0a0a0c;
  --surface:#101013;
  --surface2:#16161a;
  --surface3:#1c1c21;

  /* Borders — hairlines */
  --border:rgba(255,255,255,0.065);
  --border2:rgba(255,255,255,0.035);
  --border3:rgba(255,255,255,0.018);

  /* Text */
  --text:#f3efe7;
  --text2:rgba(243,239,231,0.66);
  --text3:rgba(243,239,231,0.38);
  --text4:rgba(243,239,231,0.22);

  /* Gold accent */
  --gold:#d4a84f;
  --gold-soft:#e2bd6c;
  --gold-deep:#a07830;
  --gold-glow:rgba(212,168,79,0.14);
  --gold-glow2:rgba(212,168,79,0.06);
  --gold-line:rgba(212,168,79,0.32);

  /* Semantic */
  --ok:#34c08a;
  --warn:#e8a838;
  --err:#e57373;

  /* Spacing scale (4px grid) */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:20px;
  --s-6:24px; --s-7:32px; --s-8:40px; --s-9:48px; --s-10:64px;

  /* Radii */
  --r-xs:4px; --r-sm:6px; --r-md:8px; --r-lg:10px; --r-xl:14px; --r-2xl:18px;

  /* Shadows */
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.55);
  --shadow-gold:0 8px 28px rgba(212,168,79,0.12);

  /* Motion */
  --ease:cubic-bezier(0.22,1,0.36,1);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --t-fast:160ms;
  --t-mid:240ms;
  --t-slow:360ms;
  --t-drawer:320ms;

  /* Type */
  --font-sans:'Inter','SF Pro Text',system-ui,-apple-system,sans-serif;
  --font-serif:'Fraunces','Playfair Display',Georgia,serif;
  --font-mono:'JetBrains Mono','SF Mono',ui-monospace,monospace;
}
body{font-family:var(--font-sans);
  background:
    radial-gradient(1200px 600px at 50% -200px,rgba(212,168,79,0.07),transparent 60%),
    radial-gradient(900px 500px at 90% 110%,rgba(108,96,217,0.025),transparent 60%),
    var(--bg);
  color:var(--text);font-size:13px;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  font-feature-settings:'cv11','ss01','ss03';
  text-rendering:optimizeLegibility;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(212,168,79,0.18);border-radius:99px;border:1px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(212,168,79,0.35);background-clip:content-box}
input,button{outline:none;font:inherit;border:none;background:none;color:inherit}
button{-webkit-tap-highlight-color:transparent}
a{text-decoration:none;color:inherit}

/* Visible keyboard focus only */
:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px;border-radius:6px}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px}
input.search-in:focus-visible{outline:none}

/* Selection */
::selection{background:rgba(212,168,79,0.28);color:#fff}

/* noise texture overlay */
body::before{content:'';position:fixed;inset:0;opacity:0.022;pointer-events:none;z-index:0;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:220px}

/* Faint vertical accent line down the page center on wide screens */
body::after{content:'';position:fixed;top:0;bottom:0;left:50%;width:1px;
  background:linear-gradient(180deg,transparent,rgba(212,168,79,0.04) 30%,rgba(212,168,79,0.04) 70%,transparent);
  pointer-events:none;z-index:0;opacity:0.6}
@media(max-width:1100px){body::after{display:none}}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.45;transform:scale(0.78)}}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.fade-up{animation:fade-up 0.55s var(--ease-out) both}
.fade-in{animation:fade-in 0.4s var(--ease-out) both}

/* Skeleton shimmer */
@keyframes skel{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,rgba(255,255,255,0.025) 25%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.025) 75%);background-size:800px 100%;animation:skel 1.6s ease infinite;border-radius:var(--r-sm)}

/* Premium card system */
.cat-block{
  background:linear-gradient(180deg,rgba(255,255,255,0.018),rgba(255,255,255,0)) var(--surface);
  transition:border-color var(--t-mid) var(--ease),background-color var(--t-mid) var(--ease),box-shadow var(--t-mid) var(--ease),transform var(--t-mid) var(--ease);
  position:relative;
}
.cat-block::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:transparent;transition:background var(--t-mid) var(--ease);
}
.cat-block.is-open::before{background:linear-gradient(180deg,var(--accent,var(--gold-line)) 0%,transparent 100%)}
.cat-btn{transition:all var(--t-mid) var(--ease)!important;border-radius:0}
.cat-btn:active{transform:scale(0.992)!important}

/* Subtle background size bar */
.size-bar{position:absolute;left:0;right:0;bottom:0;height:1px;background:rgba(255,255,255,0.025);overflow:hidden}
.size-bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent,var(--gold-line)),transparent);opacity:0.55;transition:width var(--t-slow) var(--ease)}

/* Stat cards */
.mobile-stat-card{
  background:linear-gradient(180deg,rgba(212,168,79,0.045),rgba(255,255,255,0.005));
  border:1px solid var(--border2)!important;
  border-radius:var(--r-md)!important;
}

/* Search premium */
.search-wrap{position:relative;flex:1;max-width:520}
.search-in{
  background:linear-gradient(180deg,rgba(255,255,255,0.035),rgba(255,255,255,0.012))!important;
  backdrop-filter:blur(16px);
  border:1px solid var(--border)!important;
  transition:border-color var(--t-fast) ease,box-shadow var(--t-fast) ease,background var(--t-fast) ease;
  font-feature-settings:'tnum';
}
.search-in:focus{
  border-color:rgba(212,168,79,0.42)!important;
  box-shadow:0 0 0 3px rgba(212,168,79,0.10),0 12px 30px rgba(212,168,79,0.06)!important;
  background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02))!important;
}
.search-in::placeholder{color:var(--text3);font-weight:400}

/* Drawer premium */
.drawer{
  background:rgba(10,10,12,0.97)!important;
  backdrop-filter:blur(24px);
  border-right:1px solid var(--border)!important;
  transition:transform var(--t-drawer) var(--ease)!important;
  box-shadow:8px 0 40px rgba(0,0,0,0.5);
}

/* Section label */
.section-label{
  font-size:9px;color:var(--text3);font-family:var(--font-mono);
  text-transform:uppercase;letter-spacing:0.22em;
  padding:18px 24px 12px;font-weight:500;
}
.section-label::before{
  content:'';display:inline-block;width:14px;height:1px;
  background:var(--gold-line);vertical-align:middle;margin-right:10px;
}

/* Scroll fade at bottom */
.scroll-fade{
  position:sticky;bottom:0;left:0;right:0;
  height:96px;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(6,6,7,0.92));
  margin-top:-96px;
}

/* Footer */
.vault-footer{
  border-top:1px solid var(--border2);
  padding:var(--s-9) var(--s-7) var(--s-10);
  text-align:center;
}
.status-dot{
  width:7px;height:7px;border-radius:999px;
  background:var(--ok);
  box-shadow:0 0 12px rgba(52,192,138,0.55);
  display:inline-block;margin-right:6px;
  animation:pulse-dot 3s ease infinite;
  flex-shrink:0;
}

/* Tree row hover */
.tree-row{transition:background var(--t-fast) ease,color var(--t-fast) ease;position:relative}
.tree-row:hover{background:rgba(255,255,255,0.025)}
.tree-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--gold-line);transition:width var(--t-fast) ease;opacity:0}
.tree-row:hover::before{width:2px;opacity:1}

/* Control buttons */
.ctrl{padding:6px 13px;border-radius:var(--r-sm);border:1px solid var(--border);color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;letter-spacing:0.01em;background:transparent;transition:all var(--t-fast) ease;font-family:var(--font-sans)}
.ctrl:hover{color:var(--text2);border-color:rgba(255,255,255,0.14);background:var(--surface)}
.ctrl.on{color:var(--gold);border-color:rgba(212,168,79,0.32);background:var(--gold-glow2)}

/* Sidebar buttons */
.sb-btn{transition:all var(--t-fast) ease;border:none;cursor:pointer;text-align:left;position:relative}
.sb-btn:hover{background:rgba(255,255,255,0.035)!important}
.sb-btn.active-sb{background:linear-gradient(90deg,rgba(212,168,79,0.10),transparent 60%)!important}
.sb-btn.active-sb::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--gold);border-radius:99px}

/* Logo glow */
.logo-mark{position:relative}
.logo-mark::after{content:'';position:absolute;inset:-4px;border-radius:12px;background:radial-gradient(circle,rgba(212,168,79,0.18),transparent 70%);opacity:0;transition:opacity var(--t-mid) ease;pointer-events:none}
.logo-mark:hover::after{opacity:1}

/* Stat values */
.stat-val{font-family:var(--font-serif);font-size:1.18rem;font-weight:600;color:var(--gold);letter-spacing:-0.025em;line-height:1;font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.14em;margin-top:5px;font-family:var(--font-mono);font-weight:500}

/* ── Mobile ─────────────────────────────────── */
@media(max-width:640px){
  body{font-size:14px;overflow-x:hidden}
  body::after{display:none}
  .sidebar-nav{display:none!important}
  .ctrl-row{display:none!important}
  .updated-label{display:none!important}
  .desktop-stats{display:none!important}

  /* Header stacks vertically */
  .header-brand{
    flex-direction:column!important;align-items:flex-start!important;
    padding:14px 18px 0!important;height:auto!important;gap:0!important
  }
  .brand-left{width:100%}
  .mobile-hamburger{display:flex!important}

  /* Search row */
  .header-search-row{
    padding:12px 18px 14px!important;gap:8px!important
  }
  .search-in{
    font-size:16px!important;height:46px!important;
    border-radius:12px!important;padding:0 16px 0 42px!important
  }
  .search-icon{top:50%!important;left:14px!important}

  /* 2x2 stat grid */
  .mobile-stats{
    display:grid!important;
    grid-template-columns:1fr 1fr;
    gap:8px;padding:10px 18px 14px;
    border-top:1px solid var(--border3)
  }
  .mobile-stat-card{
    padding:12px 14px;
    display:flex;flex-direction:column;gap:3px
  }
  .mobile-stat-val{
    font-family:var(--font-serif);
    font-size:1.35rem;font-weight:600;color:var(--gold);
    line-height:1;letter-spacing:-0.025em;font-variant-numeric:tabular-nums
  }
  .mobile-stat-lbl{
    font-size:9px;color:var(--text3);
    text-transform:uppercase;letter-spacing:0.12em;font-family:var(--font-mono);font-weight:500
  }

  /* Category cards on mobile */
  .cat-btn{
    padding:16px 18px!important;
    min-height:44px
  }
  .cat-name{font-size:1rem!important;white-space:normal!important}
  .cat-meta{flex-direction:column!important;gap:2px!important}
  .cat-meta span{display:block}

  /* Touch targets */
  .cat-go{width:44px!important;height:44px!important;font-size:1rem!important}
  .go-link{width:32px!important;height:32px!important}

  /* Tree rows bigger */
  .tree-row{padding-top:9px!important;padding-bottom:9px!important}

  /* Safe area */
  main{padding-bottom:env(safe-area-inset-bottom)}

  /* Drawer overlay */
  .drawer-overlay{display:block!important}
  .drawer{transform:translateX(0)!important}
}
@media(min-width:641px){
  .mobile-stats{display:none!important}
  .mobile-hamburger{display:none!important}
  .drawer-overlay{display:none!important}
}

/* ─── CORTEXA VAULT — Surgical evolution layer ───────────────── */

/* Layer 3: ambient category glow — adapts via --accent-rgb on body */
body{
  --accent-rgb:212,168,79;
  transition:background var(--t-slow) var(--ease);
}
.ambient-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 600px at 12% 8%,rgba(var(--accent-rgb),0.055),transparent 65%),
    radial-gradient(1100px 700px at 88% 96%,rgba(var(--accent-rgb),0.035),transparent 60%);
  transition:background var(--t-slow) var(--ease),opacity var(--t-slow) var(--ease);
  opacity:0.95;
}

/* Faint radial structure (Layer 4) — very subtle archive grid feel */
.archive-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.18;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:64px 64px,64px 64px;
  mask-image:radial-gradient(ellipse at 50% 40%,rgba(0,0,0,0.7),transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 40%,rgba(0,0,0,0.7),transparent 75%);
}

/* ── Category Focus Mode ── */
.cat-block{will-change:opacity,transform,filter}
.cat-block.is-dimmed{
  opacity:0.38;
  filter:blur(0.6px) saturate(0.85);
  pointer-events:none;
}
.cat-block.is-focused{
  transform:translateZ(0);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.55),
    0 0 0 1px rgba(var(--accent-rgb),0.18),
    0 0 120px -20px rgba(var(--accent-rgb),0.32);
  z-index:2;
}
.cat-block.is-focused .cat-btn{
  padding-top:18px!important;padding-bottom:18px!important;
}
.cat-block.is-focused .cat-name{
  font-size:1.02rem!important;
  letter-spacing:-0.022em!important;
}

/* Sibling category dim animation */
.cat-block{
  transition:
    border-color var(--t-mid) var(--ease),
    background-color var(--t-mid) var(--ease),
    box-shadow var(--t-slow) var(--ease),
    transform var(--t-mid) var(--ease),
    opacity 480ms var(--ease),
    filter 480ms var(--ease);
}

/* Sidebar atmospheric depth */
.sidebar-nav{
  box-shadow:
    inset -1px 0 rgba(255,255,255,0.018),
    inset 0 0 90px rgba(var(--accent-rgb),0.045);
  transition:box-shadow var(--t-slow) var(--ease);
  position:relative;
}
.sidebar-nav::after{
  content:'';position:absolute;top:0;bottom:0;right:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(var(--accent-rgb),0.18) 30%,rgba(var(--accent-rgb),0.18) 70%,transparent);
  opacity:0.35;
}

/* Active sidebar item — refined glow rail */
.sb-btn.active-sb::before{
  box-shadow:0 0 8px rgba(var(--accent-rgb),0.55);
}

/* Archive label chip — the FIN-042 / ML-118 feel */
.archive-label{
  font-family:var(--font-mono);font-size:9.5px;
  letter-spacing:0.14em;text-transform:uppercase;
  color:var(--text3);font-weight:500;
  padding:2px 7px;border-radius:3px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,0.015);
  font-variant-numeric:tabular-nums;
}

/* Progressive child reveal in tree */
@keyframes tree-rise{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:none}
}
.tree-children > div{
  animation:tree-rise 380ms var(--ease) both;
}
.tree-children > div:nth-child(1){animation-delay:0ms}
.tree-children > div:nth-child(2){animation-delay:24ms}
.tree-children > div:nth-child(3){animation-delay:48ms}
.tree-children > div:nth-child(4){animation-delay:72ms}
.tree-children > div:nth-child(5){animation-delay:96ms}
.tree-children > div:nth-child(6){animation-delay:120ms}
.tree-children > div:nth-child(n+7){animation-delay:140ms}

/* Search beam — predictive caret */
.search-wrap.is-active::after{
  content:'';position:absolute;left:36px;right:48px;bottom:6px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb),0.45),transparent);
  animation:beam 1.6s var(--ease) infinite;
  pointer-events:none;border-radius:99px;
}
@keyframes beam{
  0%{transform:scaleX(0.2);opacity:0;transform-origin:left}
  50%{opacity:0.8}
  100%{transform:scaleX(1);opacity:0;transform-origin:right}
}

/* ── Vault Reveal (cinematic loader) ── */
.vault-reveal{
  position:fixed;inset:0;z-index:1000;
  background:
    radial-gradient(900px 620px at 50% 42%,rgba(212,168,79,0.085),transparent 62%),
    radial-gradient(720px 540px at 50% 112%,rgba(108,96,217,0.035),transparent 58%),
    #050506;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:22px;overflow:hidden;
  opacity:1;
  transition:opacity 820ms cubic-bezier(0.45,0,0.55,1);
}
.vault-reveal.is-exiting{
  opacity:0;
  pointer-events:none;
}

/* Aperture ring sweeps — slow, premium */
.vr-ring{
  position:absolute;top:50%;left:50%;
  width:170px;height:170px;border-radius:50%;
  border:1px solid rgba(212,168,79,0.14);
  opacity:0;pointer-events:none;
  transform:translate(-50%,-50%) scale(0.5);
  transform-origin:center;
  animation:vr-ring 4.6s var(--ease-out) 900ms infinite;
}
.vr-ring.r2{animation-delay:2900ms}
@keyframes vr-ring{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  18%{opacity:0.7}
  100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}
}

/* Sigil — slow metallic emergence */
.vr-sigil{
  width:120px;height:120px;position:relative;
  opacity:0;filter:blur(14px) brightness(0.45);
  transform:scale(0.86);
  animation:vr-sigil-emerge 1100ms var(--ease-out) 400ms forwards;
}
.vr-sigil img{
  width:100%;height:100%;display:block;
  user-select:none;-webkit-user-drag:none;
  filter:drop-shadow(0 8px 32px rgba(212,168,79,0.18));
}
@keyframes vr-sigil-emerge{
  0%{opacity:0;filter:blur(14px) brightness(0.45);transform:scale(0.86)}
  55%{opacity:0.9;filter:blur(2px) brightness(0.95);transform:scale(0.97)}
  100%{opacity:1;filter:blur(0) brightness(1);transform:scale(1)}
}
.vr-sigil::before{
  content:'';position:absolute;inset:-40px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,168,79,0.18),transparent 65%);
  opacity:0;pointer-events:none;
  animation:vr-halo 3.6s cubic-bezier(0.45,0,0.55,1) 1400ms infinite;
}
@keyframes vr-halo{
  0%,100%{opacity:0.42;transform:scale(0.92)}
  50%{opacity:0.95;transform:scale(1.08)}
}

/* Wordmark — luxury watch reveal: letter-spacing relaxes from wide to natural */
.vr-brand{
  font-family:var(--font-serif);font-weight:600;
  font-size:2.55rem;color:var(--text);
  display:flex;align-items:baseline;justify-content:center;
  white-space:nowrap;
  margin-top:6px;
}
.vr-brand .vr-word{
  display:inline-block;
  opacity:0;
  letter-spacing:0.55em;
  filter:blur(8px);
  transform:translateY(2px);
  animation:vr-wordmark 1200ms var(--ease-out) 1100ms forwards;
  background:linear-gradient(180deg,#f3efe7 0%,#cfc5b3 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.vr-brand .vr-word.w2{animation-delay:1240ms}
.vr-brand .vr-gap{display:inline-block;width:0.36em}
@keyframes vr-wordmark{
  0%{opacity:0;letter-spacing:0.55em;filter:blur(8px);transform:translateY(2px)}
  55%{opacity:0.85;filter:blur(0);transform:translateY(0)}
  100%{opacity:1;letter-spacing:-0.018em;filter:blur(0);transform:translateY(0)}
}

/* Tagline — secondary priority */
.vr-tagline{
  font-family:var(--font-sans);font-size:10.5px;color:var(--text3);
  letter-spacing:0.42em;text-transform:uppercase;font-weight:500;
  opacity:0;transform:translateY(4px);
  animation:vr-fade-up 700ms var(--ease-out) 1750ms forwards;
}
@keyframes vr-fade-up{
  to{opacity:1;transform:translateY(0)}
}

/* Hairline divider */
.vr-divider{
  width:88px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,79,0.42),transparent);
  opacity:0;
  animation:vr-fade-in 600ms var(--ease) 2050ms forwards;
}
@keyframes vr-fade-in{
  to{opacity:1}
}

/* Status narrative — sequential reveal */
.vr-status-list{
  display:flex;flex-direction:column;align-items:center;
  gap:9px;margin-top:6px;min-height:108px;
}
.vr-status{
  font-family:var(--font-mono);font-size:9.5px;
  letter-spacing:0.34em;text-transform:uppercase;color:var(--text3);
  opacity:0;transform:translateY(3px);filter:blur(4px);
  animation:vr-status-in 560ms var(--ease-out) forwards;
}
.vr-status.s1{animation-delay:2150ms}
.vr-status.s2{animation-delay:2600ms}
.vr-status.s3{animation-delay:3100ms}
.vr-status.s4{
  animation-delay:3650ms;
  color:var(--gold-soft);
  letter-spacing:0.4em;
  text-shadow:0 0 14px rgba(212,168,79,0.42);
  font-weight:500;
}
@keyframes vr-status-in{
  from{opacity:0;transform:translateY(3px);filter:blur(4px)}
  to{opacity:1;transform:translateY(0);filter:blur(0)}
}

/* Developer credit — studio ending beat */
.vr-credit{
  position:absolute;
  bottom:46px;left:50%;
  transform:translateX(-50%) translateY(4px);
  font-family:var(--font-sans);font-size:9px;
  letter-spacing:0.44em;text-transform:uppercase;
  font-weight:400;
  color:rgba(212,168,79,0.42);
  opacity:0;
  animation:vr-credit-in 900ms var(--ease-out) 4450ms forwards;
}
@keyframes vr-credit-in{
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* Brand title styling (used in main app) */
.brand-title{font-family:var(--font-serif);font-feature-settings:'ss01'}

/* Reduced motion */
@media (prefers-reduced-motion:reduce){
  .vault-reveal,.vault-reveal *,.tree-children > div,.search-wrap.is-active::after{
    animation-duration:0.001ms!important;animation-delay:0ms!important;
    transition-duration:0.001ms!important;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

function hexRgb(h){ return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
function fmtNum(n){ return n?.toLocaleString('en-IN')??'—' }
function fmtIST(iso){ if(!iso)return null; return new Date(iso).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true})+' IST'; }
function fmtRel(iso){ if(!iso)return null; const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000); if(m<1)return'just now'; if(m<60)return`${m}m ago`; const h=Math.floor(m/60); if(h<24)return`${h}h ago`; return`${Math.floor(h/24)}d ago`; }

function useLS(key,init){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s!==null?JSON.parse(s):init;}catch{return init;}});
  const ref=useRef(val);ref.current=val;
  function set(v){const next=typeof v==='function'?v(ref.current):v;ref.current=next;setVal(next);try{localStorage.setItem(key,JSON.stringify(next));}catch{}}
  return[val,set];
}
function useSS(key,init){
  const[val,setVal]=useState(()=>{try{const s=sessionStorage.getItem(key);return s!==null?JSON.parse(s):init;}catch{return init;}});
  const ref=useRef(val);ref.current=val;
  function set(v){const next=typeof v==='function'?v(ref.current):v;ref.current=next;setVal(next);try{sessionStorage.setItem(key,JSON.stringify(next));}catch{}}
  return[val,set];
}

function nodeHasMatch(n,q){ if(!q)return true; if(n.name.toLowerCase().includes(q))return true; return n.children?.some(c=>nodeHasMatch(c,q))??false; }
function catHasMatch(c,q){ if(!q)return true; if(c.name.toLowerCase().includes(q))return true; return c.children?.some(n=>nodeHasMatch(n,q))??false; }

function Hl({text,q}){
  if(!q)return <>{text}</>;
  const i=text.toLowerCase().indexOf(q);
  if(i===-1)return <>{text}</>;
  return <>{text.slice(0,i)}<mark style={{background:'rgba(212,168,79,0.16)',color:'var(--gold-soft)',padding:'0 2px',borderRadius:3,fontWeight:500}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
}

function TreeNode({node,depth,q,forceOpen,expandedSet=new Set(),onToggle=()=>{}}){
  const has=!!(node.children?.length);
  const cm=has&&node.children.some(c=>nodeHasMatch(c,q));
  const sm=!!q&&node.name.toLowerCase().includes(q);
  const vis=!q||sm||cm;
  const [localOpen,setLocalOpen]=useState(false);
  const nodeKey=node.id||null;
  const persisted=nodeKey?expandedSet.has(nodeKey):localOpen;
  const isOpen=forceOpen||persisted||(!!q&&cm);
  if(!vis)return null;
  const pad=depth*16+16;
  const url=node.id?`https://drive.google.com/drive/folders/${node.id}`:null;
  return(
    <div>
      <div className="tree-row" onClick={()=>has&&(nodeKey?onToggle(nodeKey):setLocalOpen(p=>!p))}
        style={{display:'flex',alignItems:'center',gap:6,padding:`6px 16px 6px ${pad}px`,cursor:has?'pointer':'default',userSelect:'none'}}>
        <span style={{flex:1,fontSize:depth===0?'0.78rem':'0.73rem',fontWeight:depth===0?500:400,
          color:depth===0?'var(--text)':depth===1?'var(--text2)':'var(--text3)',lineHeight:1.45,
          display:'flex',alignItems:'center',gap:6}}>
          {has&&<span style={{fontSize:'0.7rem',color:'var(--text3)',
            transition:'transform var(--t-fast) var(--ease)',transform:isOpen?'rotate(90deg)':'none',
            display:'inline-block',flexShrink:0,lineHeight:1,width:10,textAlign:'center'}}>›</span>}
          {!has&&<span style={{width:10,flexShrink:0}}/>}
          <Hl text={node.name} q={q}/>
        </span>
        {has&&<span style={{fontSize:'10px',color:'var(--text4)',fontFamily:'var(--font-mono)',flexShrink:0,fontVariantNumeric:'tabular-nums'}}>{node.children.length}</span>}
        {url&&<a href={url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} className="go-link" title="Open in Drive" aria-label="Open in Google Drive">↗</a>}
      </div>
      {has&&isOpen&&(
        <div style={{borderLeft:'1px solid var(--border2)',marginLeft:pad+10}}>
          {node.children.map(c=><TreeNode key={c.id||c.name} node={c} depth={depth+1} q={q} forceOpen={forceOpen} expandedSet={expandedSet} onToggle={onToggle}/>)}
        </div>
      )}
    </div>
  );
}

function CatBlock({cat,q,active,forceOpen,maxSizeGB,focusedId,onFocus,expandedSet=new Set(),onToggle=()=>{}}){
  const [hovered,setHovered]=useState(false);
  const vis=catHasMatch(cat,q);
  const isFocused=focusedId===cat.id;
  const anyFocused=!!focusedId;
  const show=isFocused||forceOpen||(!!q&&catHasMatch(cat,q));
  if(!vis)return null;
  const rgb=hexRgb(cat.hue);
  const url=cat.driveId?`https://drive.google.com/drive/folders/${cat.driveId}`:null;
  const sizePct=maxSizeGB?Math.min(100,Math.max(4,(cat.sizeGB||0)/maxSizeGB*100)):0;
  const isDimmed=anyFocused&&!isFocused&&!forceOpen;
  const hoverStyle=hovered&&!show&&!isDimmed?{
    transform:'translateY(-1px)',
    boxShadow:`0 10px 26px rgba(0,0,0,0.4), 0 0 0 1px rgba(${rgb},0.10)`,
  }:{};
  return(
    <div id={`cat-${cat.id}`} className={`cat-block${show?' is-open':''}${isFocused?' is-focused':''}${isDimmed?' is-dimmed':''}`}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      style={{borderBottom:'1px solid var(--border2)',scrollMarginTop:120,
        '--accent':`rgba(${rgb},0.55)`,
        '--accent-rgb':rgb,
        ...hoverStyle}}>
      <button onClick={()=>onFocus(isFocused?null:cat.id)} className="cat-btn"
        aria-expanded={show}
        style={{width:'100%',display:'flex',alignItems:'center',gap:14,padding:'14px 22px 14px 24px',cursor:'pointer',textAlign:'left',
          background:show?`linear-gradient(100deg,rgba(${rgb},0.07) 0%,rgba(${rgb},0.018) 40%,transparent 70%)`:'transparent',
          transition:'background var(--t-mid) var(--ease)'}}>
        <div className="archive-label" style={{flexShrink:0,minWidth:46,textAlign:'center',
          color:show?`rgba(${rgb},0.92)`:'var(--text3)',
          borderColor:show?`rgba(${rgb},0.32)`:'var(--border2)',
          background:show?`linear-gradient(135deg,rgba(${rgb},0.10),rgba(${rgb},0.02))`:'rgba(255,255,255,0.015)',
          boxShadow:show?`0 0 18px rgba(${rgb},0.12) inset`:'none',
          transition:'all var(--t-mid) var(--ease)'}}>
          {cat.id}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div className="cat-name" style={{fontSize:'0.88rem',fontWeight:500,letterSpacing:'-0.018em',
            color:show?'var(--text)':'var(--text)',
            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',transition:'color var(--t-fast) ease,font-size var(--t-mid) var(--ease)',
            fontFamily:'var(--font-sans)'}}>
            <Hl text={cat.name} q={q}/>
          </div>
          <div className="cat-meta" style={{display:'flex',alignItems:'center',gap:10,marginTop:5}}>
            <span style={{fontSize:'10.5px',color:'var(--text2)',fontFamily:'var(--font-mono)',fontVariantNumeric:'tabular-nums',letterSpacing:'0.01em'}}>{fmtNum(cat.count)} folders</span>
            <span style={{width:3,height:3,borderRadius:'50%',background:'var(--text4)',flexShrink:0}}/>
            <span style={{fontSize:'10.5px',color:'var(--text3)',fontFamily:'var(--font-mono)',fontVariantNumeric:'tabular-nums'}}>{cat.size}</span>
          </div>
        </div>
        {url&&<a href={url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}
          className="cat-go" title="Open in Google Drive" aria-label="Open in Google Drive"
          style={{color:`rgba(${rgb},0.55)`,minWidth:32,minHeight:32,display:'flex',alignItems:'center',justifyContent:'center'}}>↗</a>}
        <span aria-hidden style={{flexShrink:0,fontSize:'0.85rem',color:show?`rgba(${rgb},0.75)`:'var(--text3)',
          transition:'transform var(--t-mid) var(--ease),color var(--t-fast) ease',transform:show?'rotate(180deg)':'none',
          width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center'}}>⌄</span>
      </button>
      {sizePct>0&&<div className="size-bar"><span style={{width:`${sizePct}%`}}/></div>}
      {show&&(
        <div className="tree-children" style={{paddingTop:4,paddingBottom:10,background:'rgba(0,0,0,0.22)',borderTop:'1px solid var(--border3)'}}>
          {cat.children?.map(n=><TreeNode key={n.id||n.name} node={n} depth={0} q={q} forceOpen={forceOpen} expandedSet={expandedSet} onToggle={onToggle}/>)}
        </div>
      )}
    </div>
  );
}

function Loader({exiting}){
  return(
    <div className={"vault-reveal"+(exiting?" is-exiting":"")} role="status" aria-label="Loading Cortexa Vault">
      <span className="vr-ring"></span>
      <span className="vr-ring r2"></span>
      <div className="vr-sigil">
        <img src="/Logo.png" alt="" aria-hidden width="120" height="120" draggable="false"/>
      </div>
      <div className="vr-brand" aria-hidden>
        <span className="vr-word">Cortexa</span>
        <span className="vr-gap"/>
        <span className="vr-word w2">Vault</span>
      </div>
      <div className="vr-tagline">Curated for Curious Minds</div>
      <div className="vr-divider"/>
      <div className="vr-status-list" aria-hidden>
        <div className="vr-status s1">Indexing archive…</div>
        <div className="vr-status s2">Restoring knowledge map…</div>
        <div className="vr-status s3">Establishing secure connection…</div>
        <div className="vr-status s4">Vault ready</div>
      </div>
      <div className="vr-credit">Crafted by Aman Agrahari</div>
    </div>
  );
}

function App(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [minTimeReached,setMinTimeReached]=useState(false);
  const [exiting,setExiting]=useState(false);
  const [revealed,setRevealed]=useState(false);
  const [q,setQ]=useSS('vault:q','');
  const [activeId,setActiveId]=useLS('vault:activeId','01');
  const [focusedId,setFocusedId]=useSS('vault:focusedId',null);
  const [forceOpen,setForceOpen]=useSS('vault:forceOpen',false);
  const [expandedIds,setExpandedIds]=useSS('vault:expandedIds',[]);
  const [syncInfo,setSyncInfo]=useState(null);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const expandedSet=useMemo(()=>new Set(expandedIds),[expandedIds]);
  function toggleExpanded(id){setExpandedIds(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return[...s];});}
  const inputRef=useRef(null);
  const mainRef=useRef(null);
  const scrollTimer=useRef(null);
  const nq=q.trim().toLowerCase();

  const load=useCallback(()=>{
    setLoading(true);setError(null);
    fetch('/api/tree').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
      .then(d=>{setData(d);setLoading(false)}).catch(e=>{setError(e.message);setLoading(false)});
  },[]);

  useEffect(()=>{
    load();
    fetch('/api/status').then(r=>r.json()).then(setSyncInfo).catch(()=>{});
    // Minimum cinematic duration — covers sigil → wordmark → tagline → 4 status lines → credit hold
    const t=setTimeout(()=>setMinTimeReached(true),4900);
    return()=>clearTimeout(t);
  },[]);

  // Coordinate exit dissolve: trigger exiting once data settled AND cinematic timer done
  useEffect(()=>{
    if(exiting||revealed)return;
    if(!minTimeReached||loading)return;
    setExiting(true);
  },[minTimeReached,loading,exiting,revealed]);

  // Once exiting flips true, schedule reveal after dissolve duration
  useEffect(()=>{
    if(!exiting||revealed)return;
    const t=setTimeout(()=>setRevealed(true),820);
    return()=>clearTimeout(t);
  },[exiting,revealed]);
  useEffect(()=>{const t=setInterval(()=>fetch('/api/status').then(r=>r.json()).then(setSyncInfo).catch(()=>{}),60000);return()=>clearInterval(t);},[]);
  // ⌘K / Ctrl+K focuses search; Esc exits category focus
  useEffect(()=>{
    const h=(e)=>{
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();inputRef.current?.focus();}
      if(e.key==='Escape'){if(focusedId)setFocusedId(null); else if(q)setQ('');}
    }
    document.addEventListener('keydown',h);
    return()=>document.removeEventListener('keydown',h);
  },[focusedId,q]);

  const visible=useMemo(()=>(data?.categories||[]).filter(c=>catHasMatch(c,nq)),[data,nq]);
  const stats=data?.stats;
  const cats=data?.categories||[];
  const maxSizeGB=useMemo(()=>cats.reduce((m,c)=>Math.max(m,c.sizeGB||0),0),[cats]);

  // Adapt ambient atmosphere to focused category
  useEffect(()=>{
    const target=focusedId?cats.find(c=>c.id===focusedId):null;
    const rgb=target?hexRgb(target.hue):'212,168,79';
    document.body.style.setProperty('--accent-rgb',rgb);
  },[focusedId,cats]);

  // Restore scroll position once reveal completes and data is present
  useEffect(()=>{
    if(!revealed||!data||!mainRef.current)return;
    try{const s=sessionStorage.getItem('vault:scroll');if(s)mainRef.current.scrollTop=parseInt(s,10);}catch{}
  },[revealed,data]);

  const handleScroll=useCallback(()=>{
    if(scrollTimer.current)clearTimeout(scrollTimer.current);
    scrollTimer.current=setTimeout(()=>{
      try{sessionStorage.setItem('vault:scroll',String(mainRef.current?.scrollTop||0));}catch{}
    },200);
  },[]);

  function scrollTo(id){setActiveId(id);setFocusedId(id);document.getElementById(`cat-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'});}
  function handleFocus(id){
    setFocusedId(id);
    if(id){
      setActiveId(id);
      requestAnimationFrame(()=>{
        document.getElementById(`cat-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
      });
    }
  }

  if(!revealed)return <Loader exiting={exiting}/>;
  if(error)return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:24}}>
      <div style={{width:48,height:48,borderRadius:12,border:'1px solid rgba(229,115,115,0.22)',background:'rgba(229,115,115,0.06)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--err)',fontSize:'1.4rem'}}>!</div>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'var(--font-serif)',fontSize:'1.1rem',color:'var(--text)',marginBottom:4}}>Couldn't load the vault</div>
        <div style={{color:'var(--text3)',fontSize:'0.72rem',fontFamily:'var(--font-mono)'}}>{error}</div>
      </div>
      <button onClick={load} style={{padding:'9px 22px',borderRadius:7,border:'1px solid var(--border)',color:'var(--text)',cursor:'pointer',background:'var(--surface)',fontSize:'0.75rem',letterSpacing:'0.02em',transition:'all var(--t-fast) ease'}}>Retry</button>
    </div>
  );

  return(
    <div className="fade-up" style={{fontFamily:'var(--font-sans)',background:'var(--bg)',color:'var(--text)',height:'100vh',display:'flex',flexDirection:'column',fontSize:13,position:'relative',zIndex:1,maxWidth:1480,margin:'0 auto'}}>
      {/* Ambient atmosphere layers — adapt to focused category */}
      <div className="archive-grid" aria-hidden/>
      <div className="ambient-layer" aria-hidden/>
      <style>{`
        .cat-btn:hover{filter:brightness(1.04)}
        .go-link{flex-shrink:0;opacity:0;transition:opacity var(--t-fast) ease,color var(--t-fast) ease,border-color var(--t-fast) ease;width:20px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--border);color:var(--text3);font-size:11px}
        .tree-row:hover .go-link{opacity:1}
        .go-link:hover{color:var(--gold)!important;border-color:var(--gold-line)!important;background:var(--gold-glow2)}
        .cat-go{flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);font-size:0.78rem;transition:all var(--t-fast) ease}
        .cat-go:hover{color:var(--gold)!important;border-color:var(--gold-line)!important;background:var(--gold-glow2)}
        .sidebar::-webkit-scrollbar{width:0}
        .brand-title{font-family:var(--font-serif);font-feature-settings:'ss01'}
      `}</style>

      {/* ══ DRAWER (mobile) ══ */}
      <div className="drawer-overlay" onClick={()=>setDrawerOpen(false)}
        style={{display:'none',position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:200,backdropFilter:'blur(6px)',
          opacity:drawerOpen?1:0,pointerEvents:drawerOpen?'all':'none',transition:'opacity var(--t-mid) ease'}}>
        <nav className="drawer" onClick={e=>e.stopPropagation()} aria-label="Subject navigation"
          style={{position:'absolute',left:0,top:0,bottom:0,width:268,
            transform:drawerOpen?'translateX(0)':'translateX(-100%)',
            overflowY:'auto',display:'flex',flexDirection:'column'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'20px 18px',borderBottom:'1px solid var(--border2)'}}>
            <span style={{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--font-mono)',
              textTransform:'uppercase',letterSpacing:'0.22em',fontWeight:500}}>Subjects</span>
            <button onClick={()=>setDrawerOpen(false)} aria-label="Close menu"
              style={{width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',
                borderRadius:8,border:'1px solid var(--border)',color:'var(--text2)',cursor:'pointer',
                background:'var(--surface)',fontSize:'0.95rem'}}>✕</button>
          </div>
          <div style={{padding:'10px'}}>
            {cats.map(cat=>{
              const act=cat.id===activeId;
              const rgb=hexRgb(cat.hue);
              return(
                <button key={cat.id} className="sb-btn" onClick={()=>{scrollTo(cat.id);setDrawerOpen(false);}}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:11,padding:'11px 13px',
                    borderRadius:8,marginBottom:2,minHeight:46,
                    background:act?`linear-gradient(90deg,rgba(${rgb},0.13),rgba(${rgb},0.03))`:'transparent'}}>
                  <span style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                    background:act?`rgba(${rgb},0.95)`:'var(--text4)',
                    boxShadow:act?`0 0 8px rgba(${rgb},0.55)`:'none'}}/>
                  <span style={{fontSize:'0.9rem',flex:1,color:act?'var(--text)':'var(--text2)',fontWeight:act?500:400}}>
                    {cat.shortName}
                  </span>
                  <span style={{fontSize:'10px',color:`rgba(${rgb},0.68)`,fontFamily:'var(--font-mono)',fontVariantNumeric:'tabular-nums'}}>{cat.id}</span>
                </button>
              );
            })}
          </div>
        </nav>
      </div>

      {/* ══ HEADER ══ */}
      <header style={{flexShrink:0,background:'rgba(6,6,7,0.92)',backdropFilter:'blur(28px)',WebkitBackdropFilter:'blur(28px)',
        borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:100,overflow:'hidden'}}>

        {/* Top gold hairline */}
        <div style={{position:'absolute',top:0,left:0,right:0,height:'1px',
          background:'linear-gradient(90deg,transparent 0%,rgba(212,168,79,0.55) 30%,rgba(212,168,79,0.55) 70%,transparent 100%)'}}/>

        {/* Brand + stats row */}
        <div className="header-brand" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',height:68}}>
          <div className="brand-left" style={{display:'flex',alignItems:'center',gap:16}}>
            {/* Hamburger — mobile only */}
            <button className="mobile-hamburger" onClick={()=>setDrawerOpen(true)} aria-label="Open subjects menu"
              style={{display:'none',width:42,height:42,alignItems:'center',justifyContent:'center',
                borderRadius:9,border:'1px solid var(--border)',background:'var(--surface)',
                color:'var(--text2)',cursor:'pointer',flexShrink:0,fontSize:'1.15rem'}}>☰</button>
            {/* Logo */}
            <div className="logo-mark" style={{width:38,height:38,borderRadius:9,
              overflow:'hidden',flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center',
              border:'1px solid rgba(212,168,79,0.22)',
              background:'rgba(212,168,79,0.04)',
              boxShadow:'inset 0 1px 0 rgba(255,255,255,0.05),0 1px 6px rgba(0,0,0,0.35)'}}>
              <img src="/Logo.png" alt="Cortexa Vault" width="38" height="38" draggable="false"
                style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            </div>
            <div>
              <div className="brand-title" style={{fontSize:'1.05rem',fontWeight:600,color:'#f3efe7',letterSpacing:'-0.02em'}}>Cortexa Vault</div>
              <div style={{fontSize:'9.5px',color:'var(--text3)',fontFamily:'var(--font-mono)',marginTop:2,letterSpacing:'0.18em',textTransform:'uppercase',fontWeight:500}}>Curated for Curious Minds</div>
            </div>
          </div>
          {/* Desktop stats */}
          <div className="desktop-stats header-stats" style={{display:'flex',alignItems:'stretch',gap:0}}>
            {[
              {v:stats?.fileCount?fmtNum(stats.fileCount):'—',l:'Files'},
              {v:fmtNum(stats?.totalFolders),l:'Folders'},
              {v:stats?.totalSize||'—',l:'Total Size'},
              {v:fmtNum(stats?.totalCategories),l:'Subjects'},
            ].map((s,i)=>(
              <div key={i} className="stat-box" style={{padding:'0 22px',textAlign:'center',borderLeft:i===0?'1px solid var(--border2)':'1px solid var(--border2)',flexShrink:0,position:'relative'}}>
                <div className="stat-val">{s.v}</div>
                <div className="stat-lbl">{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Mobile 2x2 stat grid */}
        <div className="mobile-stats">
          {[
            {v:stats?.totalSize||'—',l:'Storage'},
            {v:stats?.fileCount?fmtNum(stats.fileCount):'—',l:'Files'},
            {v:fmtNum(stats?.totalFolders),l:'Folders'},
            {v:fmtNum(stats?.totalCategories),l:'Subjects'},
          ].map((s,i)=>(
            <div key={i} className="mobile-stat-card">
              <div className="mobile-stat-val">{s.v}</div>
              <div className="mobile-stat-lbl">{s.l}</div>
            </div>
          ))}
        </div>

        {/* Search + controls row */}
        <div className="header-search-row" style={{display:'flex',alignItems:'center',gap:12,padding:'11px 32px 14px',borderTop:'1px solid var(--border2)'}}>
          <div className={`search-wrap${q?' is-active':''}`} style={{position:'relative',flex:1,maxWidth:520}}>
            <svg className="search-icon" style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}
              width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden>
              <circle cx="6" cy="6" r="4.6" stroke="currentColor" strokeWidth="1.35"/>
              <line x1="9.6" y1="9.6" x2="12.6" y2="12.6" stroke="currentColor" strokeWidth="1.35" strokeLinecap="round"/>
            </svg>
            <input ref={inputRef} className="search-in" value={q} onChange={e=>setQ(e.target.value)}
              placeholder={q?"Searching the archive…":"Search the vault…"}
              aria-label="Search categories and folders"
              style={{width:'100%',padding:'10px 36px 10px 36px',
                borderRadius:8,color:'var(--text)',
                fontSize:'0.78rem',height:38,letterSpacing:'0.005em'}}/>
            {q&&<button onClick={()=>setQ('')} aria-label="Clear search" style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',cursor:'pointer',fontSize:'0.85rem',width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:4}}>✕</button>}
          </div>

          {q&&<span style={{fontSize:'10.5px',color:'var(--text2)',fontFamily:'var(--font-mono)',whiteSpace:'nowrap',padding:'4px 9px',borderRadius:99,background:'var(--surface)',border:'1px solid var(--border2)',fontVariantNumeric:'tabular-nums'}}>{visible.length}<span style={{color:'var(--text4)',margin:'0 3px'}}>/</span>{cats.length}</span>}

          <div style={{flex:1}}/>
          {/* ⌘K hint — desktop only */}
          <div className="updated-label" style={{display:'flex',alignItems:'center',gap:6,fontSize:'10px',color:'var(--text3)',fontFamily:'var(--font-mono)'}}>
            <kbd style={{padding:'2px 6px',borderRadius:4,border:'1px solid var(--border)',fontSize:'10px',background:'var(--surface)',color:'var(--text2)',fontFamily:'var(--font-mono)',letterSpacing:'0.02em'}}>⌘ K</kbd>
          </div>
          {/* Live sync status pill — always visible */}
          {(()=>{
            const st=syncInfo?.lastSyncStatus||'';
            const syncing=st.startsWith('syncing')||st.startsWith('running');
            const err=st.startsWith('err')||st.startsWith('fail');
            const dotColor=syncing?'var(--warn)':err?'var(--err)':'var(--ok)';
            const dotGlow=syncing?'rgba(232,168,56,0.55)':err?'rgba(229,115,115,0.55)':'rgba(52,192,138,0.55)';
            const label=syncing?'Syncing…':err?'Sync error':'Indexed & Synced';
            const ts=syncInfo?.lastSyncTime||stats?.lastUpdated;
            return(
              <div style={{display:'flex',alignItems:'center',gap:9,
                padding:'4px 13px 4px 9px',borderRadius:99,
                border:'1px solid var(--border)',
                background:'linear-gradient(180deg,rgba(255,255,255,0.038),rgba(255,255,255,0.012))',
                backdropFilter:'blur(10px)',
                cursor:'default',userSelect:'none',flexShrink:0}}
                title={ts?`Last sync: ${fmtIST(ts)}`:label}>
                <span style={{width:6,height:6,borderRadius:'50%',flexShrink:0,
                  background:dotColor,
                  boxShadow:`0 0 8px ${dotGlow}`,
                  animation:syncing?'pulse-dot 1s ease infinite':'pulse-dot 3s ease infinite'}}/>
                <div style={{display:'flex',flexDirection:'column',gap:0,lineHeight:1.25}}>
                  <span style={{fontSize:'10px',color:'var(--text2)',fontFamily:'var(--font-mono)',letterSpacing:'0.01em',fontWeight:500}}>{label}</span>
                  {ts&&<span style={{fontSize:'9px',color:'var(--text3)',fontFamily:'var(--font-mono)',fontVariantNumeric:'tabular-nums'}}>{fmtIST(ts)}</span>}
                </div>
              </div>
            );
          })()}

          <div className="ctrl-row" style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:1,height:16,background:'var(--border2)',flexShrink:0,marginRight:4}}/>
            <button className={`ctrl${forceOpen?' on':''}`} onClick={()=>{setForceOpen(true);setFocusedId(null);}}>Expand all</button>
            <button className="ctrl" onClick={()=>{setForceOpen(false);setFocusedId(null);setQ('');}}>Collapse</button>
          </div>
        </div>
      </header>

      {/* ══ BODY ══ */}
      <div style={{display:'flex',flex:1,minHeight:0,overflow:'hidden'}}>

        {/* Sidebar */}
        <nav className="sidebar sidebar-nav" aria-label="Subject navigation" style={{width:252,flexShrink:0,borderRight:'1px solid var(--border)',
          background:'linear-gradient(180deg,var(--bg2) 0%,var(--bg) 70%)',overflowY:'auto'}}>
          <div style={{padding:'18px 10px 24px'}}>
            <div style={{fontSize:'9px',color:'var(--text3)',fontFamily:'var(--font-mono)',textTransform:'uppercase',
              letterSpacing:'0.22em',padding:'2px 14px 14px',fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:14,height:1,background:'var(--gold-line)'}}/>
              Subject Index
            </div>
            {cats.map(cat=>{
              const act=cat.id===activeId;
              const rgb=hexRgb(cat.hue);
              const matches=catHasMatch(cat,nq);
              return(
                <button key={cat.id} className={`sb-btn${act?' active-sb':''}`} onClick={()=>scrollTo(cat.id)}
                  style={{width:'100%',display:'flex',alignItems:'center',gap:9,padding:'7px 12px 7px 14px',
                    borderRadius:6,marginBottom:1,
                    opacity:nq&&!matches?0.22:1,transition:'opacity var(--t-fast) ease'}}>
                  <span style={{width:5,height:5,borderRadius:'50%',flexShrink:0,
                    background:act?`rgba(${rgb},0.95)`:'var(--text4)',
                    boxShadow:act?`0 0 6px rgba(${rgb},0.5)`:'none',
                    transition:'all var(--t-fast) ease'}}/>
                  <span style={{fontSize:'0.74rem',flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                    letterSpacing:'-0.005em',color:act?'var(--text)':'var(--text2)',fontWeight:act?500:400,transition:'color var(--t-fast) ease'}}>
                    {cat.shortName}
                  </span>
                  <span style={{fontSize:'9.5px',color:act?`rgba(${rgb},0.75)`:'var(--text4)',fontFamily:'var(--font-mono)',fontVariantNumeric:'tabular-nums',transition:'color var(--t-fast) ease'}}>{cat.id}</span>
                </button>
              );
            })}
          </div>
        </nav>

        {/* Main */}
        <main ref={mainRef} onScroll={handleScroll} style={{flex:1,overflowY:'auto',minWidth:0,position:'relative'}}>
          {visible.length===0?(
            <div style={{padding:'120px 40px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
              <div style={{width:52,height:52,borderRadius:13,border:'1px dashed var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)'}}>
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden>
                  <circle cx="9.5" cy="9.5" r="7" stroke="currentColor" strokeWidth="1.4"/>
                  <line x1="15" y1="15" x2="20" y2="20" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                </svg>
              </div>
              <div>
                <div style={{fontFamily:'var(--font-serif)',fontSize:'1.05rem',color:'var(--text)',marginBottom:6,letterSpacing:'-0.015em'}}>No matches found</div>
                <div style={{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--font-mono)',letterSpacing:'0.04em'}}>
                  No results for <span style={{color:'var(--gold-soft)'}}>"{q}"</span>
                </div>
              </div>
              <button onClick={()=>setQ('')} className="ctrl">Clear search</button>
            </div>
          ):(
            <div>
              <div className="section-label">Subject Index<span style={{marginLeft:10,color:'var(--text4)'}}>·  {visible.length} {visible.length===1?'subject':'subjects'}</span></div>
              {visible.map(cat=>(
                <CatBlock key={cat.id} cat={cat} q={nq} active={cat.id===activeId} forceOpen={forceOpen} maxSizeGB={maxSizeGB} focusedId={focusedId} onFocus={handleFocus} expandedSet={expandedSet} onToggle={toggleExpanded}/>
              ))}
              {/* Scroll fade */}
              <div className="scroll-fade"/>
              {/* Footer */}
              <footer className="vault-footer">
                <div style={{fontSize:'9px',color:'var(--text4)',fontFamily:'var(--font-mono)',letterSpacing:'0.5em',marginBottom:32,textTransform:'uppercase'}}>── End of Archive ──</div>
                <img src="/Logo-with-Name.png" alt="Cortexa Vault" draggable="false"
                  style={{maxWidth:240,width:'62%',height:'auto',display:'block',margin:'0 auto 10px',
                    filter:'drop-shadow(0 10px 36px rgba(212,168,79,0.12))',opacity:0.96}}/>
                <div style={{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--font-mono)',letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:24,fontWeight:500}}>Curated for Curious Minds</div>
                <div style={{fontSize:'0.72rem',color:'var(--text2)',marginBottom:18,fontVariantNumeric:'tabular-nums',letterSpacing:'0.005em'}}>
                  {stats?.fileCount?fmtNum(stats.fileCount):'—'} <span style={{color:'var(--text4)'}}>Files</span>
                  <span style={{margin:'0 10px',color:'var(--text4)'}}>·</span>
                  {fmtNum(stats?.totalFolders)} <span style={{color:'var(--text4)'}}>Folders</span>
                  <span style={{margin:'0 10px',color:'var(--text4)'}}>·</span>
                  {stats?.totalSize||'—'}
                </div>
                <div style={{fontFamily:'var(--font-serif)',fontSize:'0.85rem',color:'var(--text2)',fontStyle:'italic',fontWeight:500,marginBottom:24,letterSpacing:'-0.005em'}}>&ldquo;Curated knowledge compounds forever.&rdquo;</div>
                <div style={{fontSize:'10px',fontFamily:'var(--font-mono)',letterSpacing:'0.14em',color:'var(--text3)',fontWeight:500}}>Crafted &amp; Curated by <span style={{color:'var(--gold-soft)'}}>Aman Agrahari</span></div>
              </footer>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
